{% extends "sqladmin/base.html" %}
{% block body %}
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">🛡️</div>
    <h2 class="card-title">WeatherGuard<span style="font-weight:400;color:#64748b">TN</span></h2>
    <p class="card-subtitle">Admin Panel &mdash; Sign in to continue</p>
    <form action="{{ url_for('admin:login') }}" method="POST" autocomplete="off">
      <div class="mb-3">
        <label class="form-label">Email</label>
        {% if error %}
        <input name="username" type="text" class="form-control is-invalid" placeholder="admin@weatherguard.com"
          autocomplete="off">
        <div class="invalid-feedback">{{ error }}</div>
        {% else %}
        <input name="username" type="text" class="form-control" placeholder="admin@weatherguard.com" autocomplete="off">
        {% endif %}
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        {% if error %}
        <input name="password" type="password" class="form-control is-invalid" placeholder="Enter your password"
          autocomplete="off">
        {% else %}
        <input name="password" type="password" class="form-control" placeholder="••••••••" autocomplete="off">
        {% endif %}
      </div>
      <div class="form-footer">
        <button type="submit" class="btn btn-primary w-100">Sign In</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
