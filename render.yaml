# Render Blueprint — WeatherGuardTN
databases:
  - name: weatherguard-db
    databaseName: weatherguard
    user: weatherguard_user
    plan: free
    region: frankfurt

services:
  # ── Backend API ──
  - type: web
    name: weatherguard-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: pip install -r backend/requirements.txt uvicorn
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: weatherguard-db
          property: connectionString
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: weatherguard-frontend
          property: host
      - key: FORUM_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: MLFLOW_TRACKING_URI
        value: ""

  # ── Frontend Static Site ──
  - type: web
    name: weatherguard-frontend
    runtime: static
    region: frankfurt
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/build
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: weatherguard-api
          property: host
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: weatherguard-api
          property: host
      - key: REACT_APP_GOOGLE_CLIENT_ID
        sync: false
