version: '3.8'

services:
  # MLflow Service
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: climate-mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
      - mlflow_db:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
      --serve-artifacts
    networks:
      - climate-network
    restart: unless-stopped

  # Backend Service (FastAPI)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: climate-backend
    ports:
      - "8001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      # ADD YOUR SUPABASE CONNECTION HERE
      - DATABASE_URL=postgresql://postgres:[PASSWORD]@db.xxxx.supabase.co:5432/postgres
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      - mlflow
    networks:
      - climate-network
    restart: unless-stopped

  # Frontend Service (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        # These MUST be under 'args' to be available during 'npm run build'
        - REACT_APP_API_URL=http://localhost:8001
        - REACT_APP_GOOGLE_CLIENT_ID=932539718184-1rrvuua9t4907c8nkirk8n18cglm17hk.apps.googleusercontent.com
    container_name: climate-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - climate-network
    restart: unless-stopped

networks:
  climate-network:
    driver: bridge

volumes:
  mlflow_db: