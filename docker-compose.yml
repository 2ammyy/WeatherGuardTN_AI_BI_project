version: '3.8'

services:
  # Database Service (PostgreSQL)
  db:
    image: postgres:15
    container_name: climate-db
    environment:
      POSTGRES_USER: weatheruser
      POSTGRES_PASSWORD: weatherpass
      POSTGRES_DB: weatherguard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - climate-network
    restart: unless-stopped
  # pgAdmin Service
  pgadmin:
    image: dpage/pgadmin4
    container_name: climate-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - climate-network
    restart: unless-stopped
  # MLflow Service
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2
    container_name: climate-mlflow
    ports:
      - "5001:5000"
    volumes:
      - ./mlruns:/mlflow/mlruns
      - ./mlartifacts:/mlflow/mlartifacts
      - mlflow_db:/mlflow
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/mlartifacts
      --serve-artifacts
    networks:
      - climate-network
    restart: unless-stopped

  # Backend Service (FastAPI)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: climate-backend
    ports:
      - "8001:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - PYTHONPATH=/app
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      - DATABASE_URL=postgresql://weatheruser:weatherpass@db:5432/weatherguard
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ./backend:/app
      - ./data:/data
    depends_on:
      - mlflow
      - db
    networks:
      - climate-network
    restart: unless-stopped

  # Frontend Service (React + Nginx)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        - REACT_APP_API_URL=http://localhost:8001
        - REACT_APP_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
    container_name: climate-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - climate-network
    restart: unless-stopped

networks:
  climate-network:
    driver: bridge

volumes:
  mlflow_db:
  postgres_data: